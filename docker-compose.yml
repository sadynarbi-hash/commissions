services:

  db:
    image: postgres:15-alpine
    container_name: nma_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: nma_primes
      POSTGRES_USER: nma
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nma -d nma_primes"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: nma_backend
    restart: unless-stopped
    env_file: ./backend/.env.production
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: nma_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
